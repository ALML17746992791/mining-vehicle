<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0D2137">
  
  <title>掘进队车辆保养台账</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#0A1628;--header:#1A3A5C;--card:#14273E;--surface:#1C3552;--orange:#F5A623;--text:#F5F5F5;--sub:#B0BEC5;--hint:#78909C;--red:#E53935;--yellow:#FFC107;--green:#4CAF50;--gray:#9E9E9E}
    body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    .nav{background:var(--header);padding:12px 16px;display:flex;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3)}
    .nav h1{font-size:17px;font-weight:600;display:flex;align-items:center;gap:8px;flex:1}
    .badge{background:var(--red);color:#fff;font-size:11px;padding:2px 8px;border-radius:10px;font-weight:700}
    .back-btn{background:none;border:none;color:var(--text);font-size:22px;cursor:pointer;padding:4px 8px;margin-right:4px}
    .sync-badge{background:var(--green);color:#fff;font-size:10px;padding:2px 8px;border-radius:8px;margin-left:8px}

    .login-page{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
    .login-card{background:var(--card);border-radius:16px;padding:32px 24px;width:100%;max-width:380px;text-align:center}
    .login-card .logo{font-size:48px;margin-bottom:8px}
    .login-card h2{font-size:22px;margin-bottom:4px}
    .login-card .subtitle{color:var(--hint);font-size:13px;margin-bottom:28px}
    .login-card .form-group{margin-bottom:14px;text-align:left}
    .login-card label{display:block;color:var(--sub);font-size:13px;margin-bottom:5px}
    .login-card input,.login-card select{width:100%;background:var(--surface);border:1px solid rgba(255,255,255,.08);border-radius:10px;color:var(--text);font-size:15px;padding:13px;outline:none}
    .login-card input:focus,.login-card select:focus{border-color:var(--orange)}
    .login-btn{width:100%;background:var(--orange);color:#fff;border:none;border-radius:12px;padding:14px;font-size:17px;font-weight:600;cursor:pointer;margin-top:8px}
    .login-btn:active{opacity:.85}.login-btn:disabled{opacity:.5}
    .login-error{color:var(--red);font-size:13px;margin-top:10px;min-height:20px}
    .login-links{margin-top:16px;display:flex;justify-content:space-between;font-size:12px;flex-wrap:wrap;gap:6px}
    .login-links a{color:var(--orange);cursor:pointer}
    .login-links span{color:var(--hint)}
    .checkbox-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
    .checkbox-row input[type=checkbox]{width:18px;height:18px;accent-color:var(--orange)}
    .checkbox-row label{font-size:13px;color:var(--sub);margin:0}

    .stats-section{padding:16px}
    .stats-title{font-size:15px;font-weight:600;margin-bottom:10px;display:flex;justify-content:space-between}
    .stats-title span{color:var(--hint);font-size:12px;font-weight:400}
    .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    @media(min-width:600px){.stats-grid{grid-template-columns:repeat(4,1fr)}}
    .stat-card{padding:12px;border-radius:12px;cursor:pointer;transition:transform .15s}
    .stat-card:active{transform:scale(.97)}
    .stat-card.R{background:rgba(229,57,53,.1);border:1px solid rgba(229,57,53,.3)}
    .stat-card.Y{background:rgba(255,193,7,.1);border:1px solid rgba(255,193,7,.3)}
    .stat-card.G{background:rgba(76,175,80,.1);border:1px solid rgba(76,175,80,.3)}
    .stat-card.GR{background:rgba(158,158,158,.1);border:1px solid rgba(158,158,158,.3)}
    .stat-card .sl{font-size:12px;font-weight:600;margin-bottom:4px}
    .stat-card.R .sl{color:var(--red)}.stat-card.Y .sl{color:var(--yellow)}.stat-card.G .sl{color:var(--green)}.stat-card.GR .sl{color:var(--gray)}
    .stat-card .sc{font-size:26px;font-weight:700}
    .stat-card.R .sc{color:var(--red)}.stat-card.Y .sc{color:var(--yellow)}.stat-card.G .sc{color:var(--green)}.stat-card.GR .sc{color:var(--gray)}
    .stat-card .ss{font-size:11px;opacity:.7;color:var(--hint)}

    .search{padding:0 16px 8px}
    .search-box{display:flex;align-items:center;background:var(--surface);border-radius:12px;padding:0 12px;margin-bottom:8px}
    .search-box input{flex:1;background:none;border:none;color:var(--text);font-size:15px;padding:12px 0;outline:none}
    .search-box input::placeholder{color:var(--hint)}
    .chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px}
    .chip{padding:7px 14px;border-radius:18px;font-size:13px;font-weight:500;white-space:nowrap;cursor:pointer;border:1px solid rgba(255,255,255,.12);background:transparent;color:var(--sub);transition:all .2s}
    .chip.active{background:var(--orange);color:#fff;border-color:var(--orange)}
    .chip.r{color:var(--red);border-color:rgba(229,57,53,.4)}.chip.r.active{background:var(--red);color:#fff}
    .chip.y{color:var(--yellow);border-color:rgba(255,193,7,.4)}.chip.y.active{background:var(--yellow);color:#000}
    .chip.g{color:var(--green);border-color:rgba(76,175,80,.4)}.chip.g.active{background:var(--green);color:#fff}
    .chip.gr{color:var(--gray);border-color:rgba(158,158,158,.4)}.chip.gr.active{background:var(--gray);color:#fff}

    .vlist{padding:0 16px 90px}
    .vcard{background:var(--card);border-radius:12px;padding:14px;margin-bottom:8px;display:flex;align-items:center;cursor:pointer}
    .vcard:active{background:var(--surface)}
    .vic{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-right:12px;flex-shrink:0}
    .vinfo{flex:1;min-width:0}
    .vname{font-size:15px;font-weight:600}
    .vmeta{font-size:11px;color:var(--hint);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap}
    .vdate{font-size:11px;color:var(--hint);margin-top:2px}
    .vright{text-align:right;flex-shrink:0;margin-left:10px}
    .sbadge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:18px;font-size:11px;font-weight:600}
    .sbadge .dot{width:6px;height:6px;border-radius:50%}
    .sbadge.red{background:rgba(229,57,53,.15);color:var(--red)}
    .sbadge.yellow{background:rgba(255,193,7,.15);color:var(--yellow)}
    .sbadge.green{background:rgba(76,175,80,.15);color:var(--green)}
    .sbadge.gray{background:rgba(158,158,158,.15);color:var(--gray)}
    .days{font-size:14px;font-weight:700;margin-top:4px}

    .reminder-bar{background:var(--red);color:#fff;padding:10px 16px;font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px;cursor:pointer}
    .reminder-bar .count{background:rgba(255,255,255,.25);padding:2px 10px;border-radius:10px;font-size:13px}
    .reminder-bar.y{background:var(--yellow);color:#000}

    .detail-card{background:var(--card);margin:16px 16px 0;border-radius:12px;padding:16px;position:relative}
    .detail-card h3{font-size:15px;margin-bottom:12px}
    .info-row{display:flex;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04)}
    .info-row:last-child{border:none}
    .ilabel{width:85px;color:var(--hint);font-size:12px;flex-shrink:0}
    .ivalue{font-size:14px;flex:1}
    .mr{display:flex;gap:12px;margin-bottom:10px}
    .mi{flex:1}.mlabel{color:var(--hint);font-size:11px;margin-bottom:3px}
    .mvalue{font-size:17px;font-weight:700}
    .pbar{height:5px;border-radius:3px;background:var(--surface);margin-top:10px;overflow:hidden}
    .pfill{height:100%;border-radius:3px}
    .edit-btn{position:absolute;top:12px;right:12px;background:none;border:1px solid var(--hint);color:var(--hint);padding:4px 10px;border-radius:6px;font-size:12px;cursor:pointer}
    .edit-btn:active{background:var(--surface)}

    .tab-bar{display:flex;gap:4px;margin:0 16px}
    .tab{flex:1;text-align:center;padding:10px;border-radius:8px 8px 0 0;font-size:13px;font-weight:600;cursor:pointer;background:var(--surface);color:var(--hint)}
    .tab.active{background:var(--card);color:var(--orange)}

    .record-card{background:var(--surface);margin:0 16px 8px;border-radius:10px;padding:14px}
    .record-hdr{display:flex;justify-content:space-between;margin-bottom:6px}
    .record-date{color:var(--orange);font-weight:600;font-size:13px}
    .record-person{color:var(--hint);font-size:12px}
    .record-content{font-size:14px;margin-bottom:4px}
    .record-materials{font-size:12px;color:var(--sub);margin-top:4px}
    .record-tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;margin-right:4px}
    .record-tag.mt{background:rgba(76,175,80,.15);color:var(--green)}
    .record-tag.rp{background:rgba(229,57,53,.15);color:var(--red)}

    .fab{position:fixed;bottom:24px;right:24px;background:var(--orange);color:#fff;border:none;border-radius:26px;padding:13px 22px;font-size:15px;font-weight:600;cursor:pointer;box-shadow:0 4px 16px rgba(245,166,35,.4);display:flex;align-items:center;gap:6px;z-index:50}
    .fab:active{transform:scale(.95)}
    .fab2{position:fixed;bottom:24px;left:24px;background:var(--surface);color:var(--text);border:2px solid var(--orange);border-radius:26px;padding:13px 22px;font-size:15px;font-weight:600;cursor:pointer;z-index:50}

    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:flex-end}
    .modal{background:var(--card);width:100%;border-radius:20px 20px 0 0;padding:24px 20px;max-height:85vh;overflow-y:auto}
    .modal h3{font-size:19px;margin-bottom:16px}
    .form-group{margin-bottom:12px}
    .form-group label{display:block;color:var(--sub);font-size:13px;margin-bottom:5px}
    .form-group input,.form-group textarea,.form-group select{width:100%;background:var(--surface);border:1px solid rgba(255,255,255,.08);border-radius:10px;color:var(--text);font-size:15px;padding:12px;font-family:inherit;outline:none}
    .form-group textarea{resize:vertical;min-height:70px}
    .form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:var(--orange)}
    .form-row{display:flex;gap:8px}
    .form-row .form-group{flex:1}
    .btn{width:100%;background:var(--orange);color:#fff;border:none;border-radius:12px;padding:14px;font-size:17px;font-weight:600;cursor:pointer;margin-top:8px}
    .btn:active{opacity:.85}.btn:disabled{opacity:.5}
    .btn-danger{background:var(--red)}
    .btn-sm{padding:8px 16px;font-size:13px;width:auto;border-radius:8px}
    .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:10px 20px;border-radius:22px;font-weight:600;z-index:300;animation:fadeUp .3s ease}
    @keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(15px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

    .section-title{font-size:15px;font-weight:600;padding:0 16px;margin:16px 0 8px}
    .empty{text-align:center;padding:40px;color:var(--hint)}
    .empty .icon{font-size:36px;opacity:.3;margin-bottom:8px}

    .user-card{background:var(--surface);margin:0 16px 8px;border-radius:10px;padding:14px;display:flex;align-items:center;gap:12px}
    .user-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
    .user-info{flex:1}
    .user-name{font-size:15px;font-weight:600}
    .user-role{font-size:12px;color:var(--hint)}
    .user-status{font-size:11px;padding:3px 8px;border-radius:10px}
    .user-status.active{background:rgba(76,175,80,.15);color:var(--green)}
    .user-status.pending{background:rgba(255,193,7,.15);color:var(--yellow)}
    .user-status.disabled{background:rgba(229,57,53,.15);color:var(--red)}
    .user-actions{display:flex;gap:6px}

    .menu-card{background:var(--card);margin:12px 16px;border-radius:12px;overflow:hidden}
    .menu-item{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;font-size:15px}
    .menu-item:last-child{border:none}
    .menu-item:active{background:var(--surface)}
    .menu-item .arrow{color:var(--hint);margin-left:auto}
    .menu-item .menu-icon{font-size:20px;width:28px}

    .user-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--surface);border-radius:20px;cursor:pointer;font-size:13px}
    .user-bar .avatar{width:28px;height:28px;border-radius:50%;background:var(--orange);display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;font-weight:700}
    .user-bar .role-tag{font-size:10px;padding:1px 6px;border-radius:6px;background:rgba(245,166,35,.2);color:var(--orange)}
    .pending-badge{background:var(--yellow);color:#000;font-size:10px;padding:1px 6px;border-radius:8px;font-weight:700}
    .cycle-tag{font-size:11px;padding:2px 8px;border-radius:6px;background:rgba(33,150,243,.12);color:#2196F3;font-weight:500}
    .spinner{width:32px;height:32px;border:3px solid var(--surface);border-top-color:var(--orange);border-radius:50%;animation:spin .8s linear infinite;margin-right:10px}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>

function acolor(l) { const m={red:'var(--red)',yellow:'var(--yellow)',green:'var(--green)',gray:'var(--gray)'}; return m[l]||'var(--gray)'; }
function alabel(l) { const m={red:'紧急',yellow:'警告',green:'正常',gray:'无记录'}; return m[l]||'未知'; }
function bgc(l,a) { const m={red:'229,57,53',yellow:'255,193,7',green:'76,175,80',gray:'158,158,158'}; return `rgba(${m[l]||'158,158,158'},${a})`; }
function dc(d,th) { if(d==null)return'var(--gray)'; const t=th||{warning:90,urgent:180}; if(d>t.urgent)return'var(--red)'; if(d>t.warning)return'var(--yellow)'; return'var(--green)'; }
function roleName(r) { const m={super_admin:'超级管理员',admin:'管理员',user:'普通用户'}; return m[r]||r; }
function cycleLabel(c) { const u={days:'天',months:'月',hours:'小时'}; return (c?.value||90)+' '+((c?.unit&&u[c.unit])||'天'); }
function calcAlert(d, t) { if(d==null)return'gray'; if(d>t.urgent)return'red'; if(d>t.warning)return'yellow'; return'green'; }

async function refreshVehicles() {
  const res = await api('GET', '/api/vehicles');
  if (res.ok) ALL_DATA.vehicles = res.vehicles;
}

async function render() {
  if (!currentSession && !authToken) { renderLogin(); return; }
  if (!currentSession && authToken) { renderLogin(); return; }
  const app = document.getElementById('app');
  if (currentView === 'dashboard') await renderDashboard(app);
  else if (currentView === 'detail') await renderDetail(app);
  else if (currentView === 'list') renderList(app);
  else if (currentView === 'users') await renderUserManagement(app);
  else if (currentView === 'profile') renderProfile(app);
  else await renderDashboard(app);
}

// === Login with remember-me ===
function renderLogin() {
  const savedUser = localStorage.getItem('mine_saved_user') || '';
  const savedPass = localStorage.getItem('mine_saved_pass') || '';
  const savedRem = localStorage.getItem('mine_remember') === '1';
  document.getElementById('app').innerHTML = `
    <div class="login-page">
      <div class="login-card">
        <div class="logo">⛏️</div>
        <h2>掘进队车辆保养台账</h2>
        <div class="subtitle">☁️ 云端同步 · 矿山安全管理平台</div>
        <div class="form-group"><label>姓名 / 用户名</label><input id="login-user" value="${savedRem?savedUser:''}" placeholder="请输入姓名或用户名"></div>
        <div class="form-group"><label>密码</label><input id="login-pass" type="password" value="${savedRem?savedPass:''}" placeholder="请输入密码"></div>
        <div class="checkbox-row"><input type="checkbox" id="login-remember" ${savedRem?'checked':''}><label for="login-remember">记住密码</label></div>
        <button class="login-btn" id="login-btn" onclick="doLogin()">🔐 登 录</button>
        <div class="login-error" id="login-error"></div>
        <div class="login-links">
          <a onclick="showRegister()">注册账号</a>
          <a onclick="installPWA()">📲 安装APP</a>
          <span>需管理员审批</span>
        </div>
      </div>
    </div>
  `;
  document.getElementById('login-user')?.focus();
}

async function doLogin() {
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value.trim();
  const rem = document.getElementById('login-remember').checked;
  const err = document.getElementById('login-error');
  const btn = document.getElementById('login-btn');
  if (!u || !p) { err.textContent = '请输入用户名和密码'; return; }
  btn.disabled = true; btn.textContent = '登录中...';

  const res = await api('POST', '/api/login', { username: u, password: p });
  if (!res.ok) { err.textContent = res.error; btn.disabled = false; btn.textContent = '🔐 登 录'; return; }

  // Remember password
  if (rem) {
    localStorage.setItem('mine_saved_user', u);
    localStorage.setItem('mine_saved_pass', p);
    localStorage.setItem('mine_remember', '1');
  } else {
    localStorage.removeItem('mine_saved_user');
    localStorage.removeItem('mine_saved_pass');
    localStorage.removeItem('mine_remember');
  }

  authToken = res.token;
  currentSession = res.user;
  localStorage.setItem('mine_token', authToken);
  localStorage.setItem('mine_session', JSON.stringify(res.user));

  const recRes = await api('GET', '/api/records');
  if (recRes.ok) onlineRecords = recRes.records;
  await refreshVehicles();
  currentView = 'dashboard';setTimeout(showInstallBanner,2000);
  render();
}

async function doRegister() {
  const un=document.getElementById('reg-user').value.trim(),nm=document.getElementById('reg-name').value.trim();
  const pw=document.getElementById('reg-pass').value.trim(),rl=document.getElementById('reg-role').value;
  const err=document.getElementById('reg-error'),btn=document.getElementById('reg-btn');
  if(!un||!nm||!pw){err.textContent='请填写所有字段';return}
  if(pw.length<6){err.textContent='密码至少6位';return}
  btn.disabled=true;btn.textContent='提交中...';
  const res=await api('POST','/api/register',{username:un,name:nm,password:pw,role:rl});
  if(!res.ok){err.textContent=res.error;btn.disabled=false;btn.textContent='📤 提交申请';return}
  err.style.color='var(--green)';err.textContent='✅ '+res.message;
  setTimeout(()=>renderLogin(),2000);
}

// === Dashboard ===
async function renderDashboard(app) {
  let pendingCount=0;
  if(currentSession.role==='super_admin'){const r=await api('GET','/api/pending');if(r.ok)pendingCount=r.count}

  // Recalculate stats from current vehicles
  const vs = ALL_DATA.vehicles;
  const s = {total:vs.length,urgent:0,warning:0,normal:0,noRecord:0};
  for(const v of vs) {
    const t=v.alertThreshold||{warning:90,urgent:180};
    if(v.daysSince==null)s.noRecord++;
    else if(v.daysSince>t.urgent)s.urgent++;
    else if(v.daysSince>t.warning)s.warning++;
    else s.normal++;
  }
  const urgent=vs.filter(v=>calcAlert(v.daysSince,v.alertThreshold||{warning:90,urgent:180})==='red');
  const warning=vs.filter(v=>calcAlert(v.daysSince,v.alertThreshold||{warning:90,urgent:180})==='yellow');

  const filtered=vs.filter(v=>{
    if(filterAlert!=='全部'&&calcAlert(v.daysSince,v.alertThreshold||{warning:90,urgent:180})!==filterAlert)return false;
    if(searchQuery&&!v.name.includes(searchQuery)&&!v.type.includes(searchQuery)&&!v.number.includes(searchQuery))return false;
    return true;
  });

  let remHTML='';
  if(urgent.length>0)remHTML=`<div class="reminder-bar" onclick="filterByAlert('red')">⚠️ ${urgent.length}辆车超期未保养，立即处理！<span class="count">查看</span></div>`;
  else if(warning.length>0)remHTML=`<div class="reminder-bar y" onclick="filterByAlert('yellow')">⚡ ${warning.length}辆车临近保养期限<span class="count">查看</span></div>`;

  let adminBar='';
  if(pendingCount>0)adminBar=`<div class="reminder-bar y" onclick="currentView='users';render()">📋 ${pendingCount}个待审批账号 <span class="count">审批</span></div>`;

  app.innerHTML=`
    <div class="nav"><h1>⛏️ 掘进队车辆保养台账<span class="sync-badge">☁️</span></h1><span class="badge">${urgent.length}辆逾期</span></div>
    <div style="padding:8px 16px;display:flex;justify-content:space-between;align-items:center;gap:8px">
      <div class="user-bar" onclick="currentView='profile';render()">
        <div class="avatar">${currentSession.name[0]}</div><span>${currentSession.name}</span><span class="role-tag">${roleName(currentSession.role)}</span>
      </div>
      <button class="btn btn-sm" style="padding:6px 12px;font-size:12px" onclick="installPWA()">📲 安装</button>
    </div>
    ${adminBar}${remHTML}
    <div class="stats-section">
      <div class="stats-title">保养状态概览<span>共 ${s.total} 辆</span></div>
      <div class="stats-grid">
        <div class="stat-card R" onclick="filterByAlert('red')"><div class="sl">🔴 紧急提醒</div><div class="sc">${s.urgent} 辆</div><div class="ss">超期</div></div>
        <div class="stat-card G" onclick="filterByAlert('green')"><div class="sl">🟢 正常状态</div><div class="sc">${s.normal} 辆</div><div class="ss">期限内</div></div>
        <div class="stat-card Y" onclick="filterByAlert('yellow')"><div class="sl">🟡 警告提醒</div><div class="sc">${s.warning} 辆</div><div class="ss">临近</div></div>
        <div class="stat-card GR" onclick="filterByAlert('gray')"><div class="sl">⬜ 无记录</div><div class="sc">${s.noRecord} 辆</div><div class="ss">需建档</div></div>
      </div>
    </div>
    <div class="search">
      <div class="search-box"><span style="color:var(--hint);margin-right:6px">🔍</span><input placeholder="搜索车辆..." value="${searchQuery}" oninput="onSearch(this.value)"></div>
      <div class="chips">
        ${[{k:'全部',c:''},{k:'🔴紧急',c:'r'},{k:'🟡警告',c:'y'},{k:'🟢正常',c:'g'},{k:'⬜无记录',c:'gr'}].map(x=>{
          const v=x.k.includes('紧急')?'red':x.k.includes('警告')?'yellow':x.k.includes('正常')?'green':x.k.includes('无记录')?'gray':'全部';
          return `<span class="chip ${x.c} ${filterAlert===v?'active':''}" onclick="filterByAlert('${v}')">${x.k}</span>`;
        }).join('')}
      </div>
    </div>
    <div class="vlist">
      ${filtered.length===0?`<div class="empty"><div class="icon">🔍</div><p>没有匹配车辆</p></div>`:filtered.map(v=>`
        <div class="vcard" onclick="openDetail(${v.id})">
          <div class="vic" style="background:${bgc(calcAlert(v.daysSince,v.alertThreshold),.12)}">${getIcon(v)}</div>
          <div class="vinfo"><div class="vname">${v.name}</div><div class="vmeta"><span>📂 ${v.type}</span><span>🏷️ 编号:${v.number||'-'}</span><span class="cycle-tag">⏱ ${cycleLabel(v.maintenanceCycle)}</span></div><div class="vdate">${v.lastMaintenance?'上次保养: '+v.lastMaintenance:'暂无保养记录'}</div></div>
          <div class="vright"><span class="sbadge ${calcAlert(v.daysSince,v.alertThreshold)}"><span class="dot" style="background:${acolor(calcAlert(v.daysSince,v.alertThreshold))}"></span>${alabel(calcAlert(v.daysSince,v.alertThreshold))}</span>${v.daysSince!=null?`<div class="days" style="color:${dc(v.daysSince,v.alertThreshold)}">${v.daysSince}天</div>`:''}</div>
        </div>
      `).join('')}
    </div>
    <div style="display:flex;justify-content:space-around;padding:8px 16px;gap:8px;margin-bottom:16px">
      ${currentSession.role!=='user'?`<button class="btn btn-sm" style="flex:1" onclick="showAddVehicle()">➕ 添加车辆</button>`:''}
      ${currentSession.role==='super_admin'?`<button class="btn btn-sm" style="flex:1" onclick="currentView='users';render()">👥 用户管理</button>`:''}
      <button class="btn btn-sm" style="flex:1;background:var(--green)" onclick="exportCSV()">📥 导出CSV</button>
      <button class="btn btn-sm" style="flex:1;background:var(--surface);color:var(--text)" onclick="copyTunnelUrl()">🔗 公网地址</button>
      <button class="btn btn-sm" style="flex:1;background:var(--red)" onclick="doLogout()">🚪 退出</button>
    </div>
  `;
}

// === Detail ===
async function renderDetail(app) {
  const v=currentVehicle;if(!v){currentView='dashboard';await render();return}
  const localRecs=getRecords(v.id);
  const maintRecs=v.maintenanceRecords||[],repairRecs=v.repairRecords||[];
  const t=v.alertThreshold||{warning:90,urgent:180};
  const progress=v.daysSince!=null?Math.min(v.daysSince/t.urgent,1):0;
  const pc=dc(v.daysSince,t);

  const allRecords=[
    ...maintRecs.map(r=>({...r,type:'maintenance',source:'excel'})),
    ...repairRecs.map(r=>({...r,type:'repair',source:'excel'})),
    ...localRecs.map(r=>({...r,type:r.type||'maintenance',source:'cloud'}))
  ].sort((a,b)=>(b.date||'').localeCompare(a.date||''));

  const displayRecords=detailTab==='maintenance'?allRecords.filter(r=>r.type==='maintenance'):allRecords.filter(r=>r.type==='repair');

  const canEdit=currentSession.role!=='user';

  app.innerHTML=`
    <div class="nav"><button class="back-btn" onclick="goBack()">←</button><h1>${v.name}</h1></div>
    <div class="detail-card">
      ${canEdit?`<button class="edit-btn" onclick="showEditVehicle(${v.id})">✏️ 编辑</button>`:''}
      <h3>📋 基本信息</h3>
      <div class="info-row"><span class="ilabel">资产类型</span><span class="ivalue">${v.type}</span></div>
      <div class="info-row"><span class="ilabel">编号</span><span class="ivalue">${v.number||'-'}</span></div>
      <div class="info-row"><span class="ilabel">使用状况</span><span class="ivalue">${v.status}</span></div>
      <div class="info-row"><span class="ilabel">保养周期</span><span class="ivalue"><span class="cycle-tag">⏱ 每 ${cycleLabel(v.maintenanceCycle)}</span></span></div>
      <div class="info-row"><span class="ilabel">告警阈值</span><span class="ivalue">⚠️ ${t.warning}天 / 🔴 ${t.urgent}天</span></div>
    </div>
    <div class="detail-card"><h3>🔧 保养状态</h3>
      <div class="mr"><div class="mi"><div class="mlabel">上次保养</div><div class="mvalue" style="color:${v.lastMaintenance?'var(--text)':'var(--gray)'}">${v.lastMaintenance||'无记录'}</div></div>
      <div class="mi"><div class="mlabel">距今天数</div><div class="mvalue" style="color:${dc(v.daysSince,t)}">${v.daysSince!=null?v.daysSince+' 天':'-'}</div></div></div>
      <div class="pbar"><div class="pfill" style="width:${progress*100}%;background:${pc}"></div></div>
      <div style="margin-top:10px;font-size:12px;color:var(--hint)">📊 Excel: ${maintRecs.length}保养+${repairRecs.length}维修 | ☁️ 云端: ${localRecs.length}条</div>
    </div>
    <div class="tab-bar">
      <div class="tab ${detailTab==='maintenance'?'active':''}" onclick="switchTab('maintenance')">🔧 保养 (${allRecords.filter(r=>r.type==='maintenance').length})</div>
      <div class="tab ${detailTab==='repair'?'active':''}" onclick="switchTab('repair')">🛠️ 维修 (${allRecords.filter(r=>r.type==='repair').length})</div>
    </div>
    <div style="padding-top:8px"></div>
    ${displayRecords.length===0?`<div class="empty"><div class="icon">📭</div><p>暂无记录</p></div>`:displayRecords.map(r=>{
      const materials=r.materials||[];
      return `<div class="record-card">
        <div class="record-hdr"><span class="record-date">📅 ${r.date}</span>
        <div>${r.type==='repair'?`<span class="record-tag rp">维修</span>`:`<span class="record-tag mt">保养</span>`}
        ${r.source==='cloud'?`<span class="record-tag" style="background:rgba(33,150,243,.15);color:#2196F3">☁️</span>`:''}
        <span class="record-person">👤 ${r.repairPerson||r.driver||r.technician||r.createdBy||''}</span></div></div>
        <div class="record-content">${r.content||''}</div>
        ${materials.length?`<div class="record-materials">📦 ${materials.map(m=>`${m.name}${m.spec?'('+m.spec+')':''} ×${m.qty}${m.unit}`).join('、')}</div>`:''}
        ${r.notes?`<div class="record-materials">💬 ${r.notes}</div>`:''}
        ${r.createdBy?`<div style="font-size:11px;color:var(--hint);margin-top:4px">录入: ${r.createdBy}</div>`:''}
      </div>`;
    }).join('')}
    <div style="height:80px"></div>
    <button class="fab" onclick="showAddModal()">➕ 新增记录</button>
    ${currentSession.role==='super_admin'?`<button class="fab2" onclick="confirmDeleteVehicle(${v.id})">🗑️ 删除</button>`:''}
  `;
}

          <option value="days" ${mc.unit==='days'?'selected':''}>天</option>

    </div></div>

}

async function saveEditVehicle(id) {
  const btn=document.getElementById('ev-btn');btn.disabled=true;btn.textContent='保存中...';
  const body={
    name:document.getElementById('ev-name').value.trim(),
    type:document.getElementById('ev-type').value.trim(),
    number:document.getElementById('ev-number').value.trim(),
    status:document.getElementById('ev-status').value,
    lastMaintenance:document.getElementById('ev-date').value||null,
    maintenanceCycle:{value:parseInt(document.getElementById('ev-cycle-val').value)||90,unit:document.getElementById('ev-cycle-unit').value},
    alertThreshold:{warning:parseInt(document.getElementById('ev-warn').value)||90,urgent:parseInt(document.getElementById('ev-urgent').value)||180}
  };
  // Calculate daysSince
  if(body.lastMaintenance){body.daysSince=Math.floor((new Date()-new Date(body.lastMaintenance))/86400000)}
  else body.daysSince=null;
  body.alertLevel=calcAlert(body.daysSince,body.alertThreshold);

  const res=await api('PUT','/api/vehicles/'+id,body);
  if(!res.ok){showToast(res.error,'var(--red)');btn.disabled=false;btn.textContent='💾 保存';return}
  document.getElementById('modal-container')?.remove();
  await refreshVehicles();
  currentVehicle=getVehicle(id);
  await render();
  showToast('✅ 车辆信息已更新','var(--green)');
}

async function saveAddVehicle() {
  const name=document.getElementById('av-name').value.trim();
  if(!name){showToast('请输入车辆名称','var(--yellow)');return}
  const btn=document.getElementById('av-btn');btn.disabled=true;btn.textContent='添加中...';
  const body={
    name,type:document.getElementById('av-type').value.trim()||name,
    number:document.getElementById('av-number').value.trim(),
    status:'在用',
    maintenanceCycle:{value:parseInt(document.getElementById('av-cycle-val').value)||90,unit:document.getElementById('av-cycle-unit').value},
    alertThreshold:{warning:90,urgent:180}
  };
  const res=await api('POST','/api/vehicles',body);
  if(!res.ok){showToast(res.error,'var(--red)');btn.disabled=false;btn.textContent='💾 添加';return}
  document.getElementById('modal-container')?.remove();
  await refreshVehicles();
  await render();
  showToast('✅ 车辆已添加','var(--green)');
}

async function confirmDeleteVehicle(id) {
  const v=getVehicle(id);if(!v)return;
  if(!confirm(`确定要删除 "${v.name}" 及所有关联记录吗？此操作不可撤销！`))return;
  const res=await api('DELETE','/api/vehicles/'+id);
  if(!res.ok){showToast(res.error,'var(--red)');return}
  await refreshVehicles();
  currentView='dashboard';currentVehicle=null;
  await render();
  showToast('✅ 车辆已删除','var(--green)');
}

// === List ===
function renderList(app) {
  const filtered=ALL_DATA.vehicles.filter(v=>{
    if(filterAlert==='全部')return true;
    return calcAlert(v.daysSince,v.alertThreshold||{warning:90,urgent:180})===filterAlert;
  });
  const lm={red:'紧急提醒',yellow:'警告提醒',green:'正常状态',gray:'无记录'};
  app.innerHTML=`
    <div class="nav"><button class="back-btn" onclick="goBack()">←</button><h1>${lm[filterAlert]||'全部车辆'} (${filtered.length}辆)</h1></div>
    <div class="vlist" style="padding-top:8px">
      ${filtered.map(v=>`
        <div class="vcard" onclick="openDetail(${v.id})">
          <div class="vic" style="background:${bgc(calcAlert(v.daysSince,v.alertThreshold),.12)}">${getIcon(v)}</div>
          <div class="vinfo"><div class="vname">${v.name}</div><div class="vmeta"><span>📂 ${v.type}</span><span>🏷️ 编号:${v.number||'-'}</span><span class="cycle-tag">⏱ ${cycleLabel(v.maintenanceCycle)}</span></div><div class="vdate">${v.lastMaintenance?'上次保养: '+v.lastMaintenance:'暂无保养记录'}</div></div>
          <div class="vright"><span class="sbadge ${calcAlert(v.daysSince,v.alertThreshold)}"><span class="dot" style="background:${acolor(calcAlert(v.daysSince,v.alertThreshold))}"></span>${alabel(calcAlert(v.daysSince,v.alertThreshold))}</span>${v.daysSince!=null?`<div class="days" style="color:${dc(v.daysSince,v.alertThreshold)}">${v.daysSince}天</div>`:''}</div>
        </div>
      `).join('')}
    </div>
  `;
}

// === User Management ===
async function renderUserManagement(app) {
  if(currentSession.role!=='super_admin'){currentView='dashboard';await render();return}
  const res=await api('GET','/api/users');userList=res.ok?res.users:[];
  app.innerHTML=`
    <div class="nav"><button class="back-btn" onclick="currentView='dashboard';render()">←</button><h1>👥 用户管理</h1></div>
    <div class="stats-section"><div class="stats-title">系统用户<span>${userList.length}人</span> <button class="btn btn-sm btn-primary" onclick="showAddUserModal()" style="margin-left:12px;">+ 添加用户</button></div></div>
    ${userList.map(u=>`
      <div class="user-card">
        <div class="user-avatar" style="background:${u.role==='super_admin'?'var(--orange)':u.role==='admin'?'var(--surface)':'var(--hint)'}">${(u.name||'?')[0]}</div>
        <div class="user-info"><div class="user-name">${u.name} ${u.role==='super_admin'?'👑':''}</div><div class="user-role">${u.username} · ${roleName(u.role)}</div></div>
        <span class="user-status ${u.status}">${u.status==='active'?'正常':u.status==='pending'?'待审批':'禁用'}</span>

async function toggleUser(u){const r=await api('POST','/api/users/approve',{username:u});if(r.ok){await renderUserManagement(document.getElementById('app'));showToast('✅ 已更新','var(--green)')}else showToast(r.error,'var(--red)')}

function showChangePassword(){const ex=document.getElementById('modal-container');if(ex)ex.remove();
  const c=document.createElement('div');c.id='modal-container';
  c.innerHTML=`<div class="modal-overlay" onclick="closeModal(event)"><div class="modal" onclick="event.stopPropagation()"><h3>🔑 修改密码</h3><div class="form-group"><label>旧密码</label><input id="cp-old" type="password"></div><div class="form-group"><label>新密码</label><input id="cp-new" type="password" placeholder="6位以上"></div><button class="btn" id="cp-btn" onclick="doChangePassword()">保存</button></div></div>`;
  document.body.appendChild(c);}
async function doChangePassword(){const o=document.getElementById('cp-old').value.trim(),n=document.getElementById('cp-new').value.trim();if(n.length<6){showToast('新密码至少6位','var(--yellow)');return}const r=await api('POST','/api/users/changePassword',{oldPassword:o,newPassword:n});if(!r.ok){showToast(r.error,'var(--red)');return}document.getElementById('modal-container')?.remove();showToast('✅ 密码已修改','var(--green)');}

// === Actions ===
function filterByAlert(level){filterAlert=level;currentView=level==='全部'?'dashboard':'list';currentVehicle=null;render();}
function onSearch(q){searchQuery=q;render();}
function goBack(){currentView='dashboard';currentVehicle=null;filterAlert='全部';searchQuery='';render();}
function openDetail(id){currentVehicle=getVehicle(id);currentView='detail';detailTab='maintenance';render();}
function switchTab(tab){detailTab=tab;render();}

// === Export CSV ===
function exportAllData(){
  const rows = [['车辆名称','类型','编号','状态','上次保养','距今天数','保养周期','告警状态','保养记录数','维修记录数']];
  for(const v of ALL_DATA.vehicles){
    const t=v.alertThreshold||{warning:90,urgent:180};
    rows.push([v.name,v.type,v.number||'',v.status||'',v.lastMaintenance||'',v.daysSince!=null?v.daysSince:'',cycleLabel(v.maintenanceCycle),alabel(calcAlert(v.daysSince,t)),(v.maintenanceRecords||[]).length,(v.repairRecords||[]).length]);
  }
  return rows.map(r=>r.map(c=>'"'+(c+'').replace(/"/g,'""')+'"').join(',')).join('\n');
}
function exportRecordsCSV(){
  const rows = [['车辆','日期','类型','内容','负责人','材料','备注']];
  for(const r of onlineRecords){
    const mat = (r.materials||[]).map(m=>m.name+' '+m.spec+' x'+m.qty+m.unit).join('; ');
    rows.push([r.vehicleName||'',r.date||'',r.type||'',r.content||'',r.driver||r.repairPerson||r.technician||r.createdBy||'',mat,r.notes||'']);
  }
  return rows.map(r=>r.map(c=>'"'+(c+'').replace(/"/g,'""')+'"').join(',')).join('\n');
}
function exportCSV(){
  const BOM = '\uFEFF'; const data = BOM + exportAllData() + '\n\n\n' + exportRecordsCSV();
  const blob = new Blob([data],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='车辆保养台账_' + new Date().toISOString().slice(0,10) + '.csv';a.click();
  showToast('✅ 已下载CSV表格','var(--green)');
}
function copyTunnelUrl(){
  const xhr=new XMLHttpRequest();xhr.open('GET','/tunnel_url.txt',true);
  xhr.onload=function(){
    const url=xhr.responseText.trim()||'';
    if(url&&url.startsWith('http')){
      navigator.clipboard.writeText(url).then(()=>showToast('✅ 公网地址已复制: '+url.substring(0,40)+'...','var(--green)')).catch(()=>prompt('公网地址（复制这段）:',url));
    }else{showToast('⚠️ 隧道未连接，请先启动公网隧道','var(--yellow)');}
  };xhr.send();
}

async function doLogout(){await api('POST','/api/logout',{token:authToken});authToken='';currentSession=null;onlineRecords=[];localStorage.removeItem('mine_token');localStorage.removeItem('mine_session');currentView='login';render();}

function showAddModal(){const ex=document.getElementById('modal-container');if(ex)ex.remove();
  const c=document.createElement('div');c.id='modal-container';
  c.innerHTML=`<div class="modal-overlay" onclick="closeModal(event)"><div class="modal" onclick="event.stopPropagation()"><h3>➕ 新增记录 - ${currentVehicle.name}</h3>
    <div class="form-group"><label>类型</label><select id="modal-type"><option value="maintenance">保养记录</option><option value="repair">维修记录</option></select></div>
    <div class="form-group"><label>日期</label><input id="modal-date" type="date" value="${new Date().toISOString().slice(0,10)}"></div>
    <div class="form-group"><label>内容 *</label><textarea id="modal-content" placeholder="保养/维修内容..."></textarea></div>
    <div class="form-group"><label>领用材料</label><input id="modal-material" placeholder="材料名称、规格、数量"></div>
    <div class="form-group"><label>负责人 *</label><input id="modal-person" placeholder="负责人姓名"></div>
    <div class="form-group"><label>备注</label><textarea id="modal-notes" placeholder="其他信息..." style="min-height:50px"></textarea></div>
    <button class="btn" id="submit-btn" onclick="submitRecord()">✅ 提交</button></div></div>`;
  document.body.appendChild(c);}
function closeModal(e){if(e.target.classList.contains('modal-overlay'))document.getElementById('modal-container')?.remove();}

async function submitRecord(){const type=document.getElementById('modal-type').value,date=document.getElementById('modal-date').value,content=document.getElementById('modal-content').value.trim(),material=document.getElementById('modal-material').value.trim(),person=document.getElementById('modal-person').value.trim(),notes=document.getElementById('modal-notes').value.trim();if(!content||!person){showToast('⚠️ 请填写内容和负责人','var(--yellow)');return}const btn=document.getElementById('submit-btn');btn.disabled=true;btn.textContent='提交中...';
  const rec={vehicleId:currentVehicle.id,vehicleName:currentVehicle.name,date,content,type,driver:type==='maintenance'?person:'',repairPerson:type==='repair'?person:'',technician:person,notes:notes||null,materials:material?[{name:material,spec:'',unit:'',qty:''}]:[]};
  const res=await api('POST','/api/records',rec);if(!res.ok){showToast(res.error,'var(--red)');btn.disabled=false;btn.textContent='✅ 提交';return}
  onlineRecords.push(res.record);
  const v=ALL_DATA.vehicles.find(v=>v.id===currentVehicle.id);
  if(v&&type==='maintenance'){if(!v.lastMaintenance||date>v.lastMaintenance){v.lastMaintenance=date;v.daysSince=Math.floor((new Date()-new Date(date))/86400000);v.alertLevel=calcAlert(v.daysSince,v.alertThreshold||{warning:90,urgent:180})}}
  currentVehicle=v;document.getElementById('modal-container')?.remove();await render();showToast('✅ 记录已同步','var(--green)');}

function showToast(msg,color){const t=document.createElement('div');t.className='toast';t.style.background=color;t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2500);}

// PWA Install
window.addEventListener('beforeinstallprompt',(e)=>{e.preventDefault();deferredInstall=e;});

let installBannerShown=false;
window.addEventListener('appinstalled',function(){var b=document.getElementById('install-banner');if(b)b.remove()});
function showInstallBanner(){
  if(installBannerShown||!deferredInstall||window.matchMedia('(display-mode: standalone)').matches)return;
  installBannerShown=true;
  var b=document.createElement('div');b.id='install-banner';
  b.style.cssText='position:fixed;bottom:20px;left:16px;right:16px;background:var(--orange);color:#fff;padding:14px 18px;border-radius:14px;display:flex;align-items:center;gap:12px;z-index:400;box-shadow:0 4px 20px rgba(245,166,35,.5);animation:fadeUp .3s ease;cursor:pointer;font-weight:600;font-size:14px';
  b.innerHTML='<span style=font-size:22px>&#x1F4F2;</span><span style=flex:1>点击安装APP到桌面</span><span style=background:rgba(255,255,255,.2);padding:6px 12px;border-radius:8px;font-size:13px>安装</span>';
  b.onclick=function(){installPWA();b.remove()};
  document.body.appendChild(b);
  setTimeout(function(){b.remove()},15000);
}

async function installPWA(){if(deferredInstall){deferredInstall.prompt();const{outcome}=await deferredInstall.userChoice;if(outcome==='accepted')showToast('✅ 正在安装...','var(--green)');deferredInstall=null}else if(window.matchMedia('(display-mode: standalone)').matches){showToast('已安装 ✓','var(--green)')}else{showToast('请用浏览器菜单→添加到主屏幕','var(--yellow)')}}

// Init

if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(function(){})}

async function init(){await loadAllData();const ss=localStorage.getItem('mine_session'),st=localStorage.getItem('mine_token');if(st&&ss){authToken=st;currentSession=JSON.parse(ss);const r=await api('GET','/api/records');if(r.ok)onlineRecords=r.records;await refreshVehicles();currentView='dashboard'}render()}
init();

var editingUsername = null;
function showAddUserModal() {
  editingUsername = null;
  document.getElementById('add-user-title').textContent = '\u6dfb\u52a0\u7528\u6237';
  document.getElementById('add-user-username').value = '';
  document.getElementById('add-user-name').value = '';
  document.getElementById('add-user-password').value = '';
  document.getElementById('add-user-role').value = 'user';
  document.getElementById('add-user-username').disabled = false;
  document.getElementById('add-user-modal').style.display = 'flex';
}
function hideAddUserModal() {
  document.getElementById('add-user-modal').style.display = 'none';
}
async function saveNewUser() {
  var u = document.getElementById('add-user-username').value.trim();
  var n = document.getElementById('add-user-name').value.trim();
  var p = document.getElementById('add-user-password').value.trim();
  var r = document.getElementById('add-user-role').value;
  if (!u || !n || !p) { showToast('\u8bf7\u586b\u5199\u6240\u6709\u5b57\u6bb5', 'var(--yellow)'); return; }
  if (p.length < 6) { showToast('\u5bc6\u7801\u81f3\u5c116\u4f4d', 'var(--yellow)'); return; }
  try {
    if (editingUsername) {
      var b = { name: n, role: r };
      if (p) b.password = p;
      var res = await api('PUT', '/api/users/' + editingUsername, b);
      if (res.ok) { showToast('\u7528\u6237\u5df2\u66f4\u65b0', 'var(--green)'); hideAddUserModal(); loadUsers(); }
      else showToast(res.error || '\u66f4\u65b0\u5931\u8d25', 'var(--red)');
    } else {
      var res = await api('POST', '/api/users/add', { username: u, password: p, name: n, role: r });
      if (res.ok) { showToast('\u7528\u6237\u5df2\u6dfb\u52a0', 'var(--green)'); hideAddUserModal(); loadUsers(); }
      else showToast(res.error || '\u6dfb\u52a0\u5931\u8d25', 'var(--red)');
    }
  } catch(e) { showToast('\u64cd\u4f5c\u5931\u8d25', 'var(--red)'); }
}

<script>
function renderUserManage() {
  var list = document.getElementById('user-manage-list');

  (userList||[]).forEach(function(u) {
    var isSelf = u.username === '\u738b\u7115\u57da';
    var roleText = u.role === 'super_admin' ? '超级管理' : u.role === 'admin' ? '管理员' : '普通用户';
    var statusText = u.status === 'active' ? '已激活' : u.status === 'pending' ? '待审批' : '已禁用';
    var btns = !isSelf ? '<button onclick="deleteUserCard('' + u.username + '')" style="color:var(--danger);background:none;border:none;cursor:pointer;">删除</button>' : '';
    html += '<tr style="border-bottom:1px solid var(--border);line-height:2.5;"><td>' + u.username + '</td><td>' + (u.name||'') + '</td><td>' + roleText + '</td><td>' + statusText + '</td><td>' + btns + '</td></tr>';
  });
  html += '</table>';
  list.innerHTML = html;
}
// Hook into existing render to also render manage list
var _origRender = render;
render = function() {
