<script>
// ===== GitHub 云同步 =====
const GH='https://api.github.com',T='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';
const GHAPI=GH+'/repos/alml17746992791/mining-vehicle/contents/data/db.json';
const GH_H={Authorization:'token '+T,Accept:'application/vnd.github.v3+json'};
let _sha=null,_syncing=false;

function b64e(s){return btoa(unescape(encodeURIComponent(s)))}
function b64d(s){return decodeURIComponent(escape(atob(s)))}

async function ghPull(){
  try{
    const r=await fetch(GHAPI,{headers:GH_H});
    if(r.status===404){_sha=null;return null}
    if(!r.ok)throw new Error(r.status);
    const d=await r.json();_sha=d.sha;
    return JSON.parse(b64d(d.content));
  }catch(e){console.log('Pull fail:',e.message);return null}
}

async function ghPush(data){
  try{
    const body={message:'数据同步 '+new Date().toLocaleString('zh-CN').slice(0,16),content:b64e(JSON.stringify(data))};
    if(_sha)body.sha=_sha;
    const r=await fetch(GHAPI,{method:'PUT',headers:{...GH_H,'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(!r.ok)throw new Error(r.status);
    const d=await r.json();_sha=d.content.sha;
    return true;
  }catch(e){console.log('Push fail:',e.message);return false}
}

function setSync(s){const e=$('syncStatus');e.className=s==='ok'?'sync-ok':s==='ing'?'sync-ing':'sync-err';e.textContent=s==='ok'?'☁️':s==='ing'?'🔄':'❌'}

async function pullAndMerge(){
  setSync('ing');
  const rd=await ghPull();
  if(!rd){setSync('err');setTimeout(()=>setSync('ok'),2000);return}
  // 合并远程数据到本地 — 远程优先
  Object.keys(rd).forEach(k=>{
    if(k.startsWith('db_'))localStorage.setItem(k,JSON.stringify(rd[k]));
    if(k==='_idSeq')Object.assign(_idSeq,rd[k]);
  });
  setSync('ok');
}

let _pushTimer=null;
function schedulePush(){
  clearTimeout(_pushTimer);
  _pushTimer=setTimeout(async ()=>{
    _syncing=true;setSync('ing');
    const data={};
    ['db_users','db_hazards','db_violations','db_equipment','db_vehicles','db_responsibilities','db_trainings','db_inspections','db_accidents','db_entry_exit','db_regulations','db_hazard_sources','db_rectifications','db_assessments'].forEach(k=>{data[k]=JSON.parse(localStorage.getItem(k)||'[]')});
    data._idSeq=_idSeq;
    const ok=await ghPush(data);
    if(ok)setSync('ok');else setSync('err');
    _syncing=false;
  },1500);
}

async function manualSync(){setSync('ing');await pullAndMerge();setSync('ok');toast('同步完成');navTo(getCurrentPage())}

// ===== Local DB =====
const $=s=>document.getElementById(s);
let CUSER=null;
let _idSeq={hazards:100,violations:200,equipment:300,vehicles:400,responsibilities:500,trainings:600,inspections:700,accidents:800,entry_exit:900,rectifications:1000,assessments:1100};

function db(tbl){return JSON.parse(localStorage.getItem('db_'+tbl)||'[]')}
function save(tbl,data){localStorage.setItem('db_'+tbl,JSON.stringify(data));schedulePush()}
function nid(tbl){return ++_idSeq[tbl]}
function addRow(tbl,row){row.id=nid(tbl);let d=db(tbl);d.push(row);save(tbl,d);return row}
function findRow(tbl,id){return db(tbl).find(x=>x.id===id)}
function updateRow(tbl,id,patch){let d=db(tbl),i=d.findIndex(x=>x.id===id);if(i>=0){Object.assign(d[i],patch);save(tbl,d)}}
function delRow(tbl,id){let d=db(tbl);d=d.filter(x=>x.id!==id);save(tbl,d)}

async function doLogin(){
  const u=$('loginUser').value.trim(),p=$('loginPass').value.trim();
  if(!u||!p)return toast('请输入');
  initDB();
  const users=db('users'),user=users.find(x=>x.username===u);
  if(!user)return toast('用户不存在');
  if(user.status==='disabled')return toast('已禁用');
  if(user.password!==p)return toast('密码错误');
  CUSER=user;
  if($('rememberMe').checked)localStorage.setItem('_savedUser',u);
  $('loginPage').classList.add('hidden');$('appPage').classList.remove('hidden');
  $('userName').textContent='👤 '+user.name;
  if(user.role==='super_admin')$('adminBtn').classList.remove('hidden');
  initNav();navTo('dashboard');
  // 后台从云端拉取最新数据（不影响登录）
 setTimeout(()=>{try{pullAndMerge()}catch(e){}},500);
}

// ===== Responsibility =====
async function loadResp(){const r=db('responsibilities');$('mainContent').innerHTML=`<div class="tb"><button class="btn bp" onclick="showAssess()">➕ 考核</button></div><div class="g">${r.map(x=>`<div class="card"><h4>👤 ${x.position_name}</h4><div class="meta"><span>上次: ${x.last_assessment_date||'—'}</span></div><div class="a"><button class="btn bxs bp" onclick="showAssess('${x.position_name}')">考核</button></div></div>`).join('')}</div>`}
function showAssess(pos=''){showModal(`<h2>责任制考核</h2><form onsubmit="submitAssess(event)"><label>岗位*</label><input type="text" name="position_name" value="${pos}" required><label>被考核人*</label><input type="text" name="person_name" required><label>日期*</label><input type="date" name="assessment_date" value="${new Date().toISOString().split('T')[0]}" required><label>周期</label><select name="assessment_period"><option>月度</option><option>季度</option><option>年度</option></select><label>得分</label><input type="number" name="score" value="100" min="0" max="100" required><label>扣分原因</label><textarea name="deduction_reasons"></textarea><label>考核人</label><input type="text" name="assessor" value="${CUSER?.name||''}" required><div class="ma"><button type="button" class="btn" onclick="closeModal()">取消</button><button type="submit" class="btn bp">提交</button></div></form>`)}
async function submitAssess(e){e.preventDefault();const d=Object.fromEntries(new FormData(e.target));d.score=+d.score;d.is_qualified=d.score>=60?1:0;addRow('assessments',d);const nd=new Date(Date.now()+30*86400000).toISOString().split('T')[0],rp=db('responsibilities'),ri=rp.findIndex(x=>x.position_name===d.position_name);if(ri>=0){rp[ri].last_assessment_date=d.assessment_date;rp[ri].next_assessment_date=nd;save('responsibilities',rp)}closeModal();loadResp();toast('已提交')}

// ===== Training =====
async function loadTraining(){const t=db('trainings');$('mainContent').innerHTML=`<div class="tb"><button class="btn bp" onclick="showTrainingForm()">➕ 培训</button></div><div style="overflow-x:auto"><table><thead><tr><th>日期</th><th>类型</th><th>主题</th><th>讲师</th><th>学时</th><th>人数</th></tr></thead><tbody>${t.map(x=>`<tr><td>${x.training_date}</td><td>${x.training_type}</td><td>${x.training_topic}</td><td>${x.trainer||'-'}</td><td>${x.training_hours}h</td><td>${x.attendees_count}</td></tr>`).join('')}</tbody></table></div>`}
function showTrainingForm(){showModal(`<h2>📚 安全培训</h2><form onsubmit="submitTraining(event)"><label>日期*</label><input type="date" name="training_date" value="${new Date().toISOString().split('T')[0]}" required><label>类型*</label><select name="training_type" required><option>三级安全教育</option><option>一般安全教育</option><option>调岗培训</option><option>特种作业</option><option>管理人员</option></select><label>主题*</label><input type="text" name="training_topic" required><label>讲师</label><input type="text" name="trainer"><label>学时</label><input type="number" name="training_hours" value="2" step="0.5"><label>人数</label><input type="number" name="attendees_count" value="0"><div class="ma"><button type="button" class="btn" onclick="closeModal()">取消</button><button type="submit" class="btn bp">提交</button></div></form>`)}
async function submitTraining(e){e.preventDefault();const d=Object.fromEntries(new FormData(e.target));d.training_hours=+d.training_hours;d.attendees_count=+d.attendees_count;addRow('trainings',d);closeModal();loadTraining()}

// ===== Inspections =====
async function loadInsp(){const i=db('inspections');$('mainContent').innerHTML=`<div class="tb"><button class="btn bp" onclick="showInspForm()">➕ 检查</button></div><div style="overflow-x:auto"><table><thead><tr><th>日期</th><th>类型</th><th>区域</th><th>检查人</th><th>合格/总数</th></tr></thead><tbody>${i.map(x=>`<tr><td>${x.inspection_date}</td><td>${x.inspection_type}</td><td>${x.inspection_area}</td><td>${x.inspector}</td><td>${(x.items_checked||0)-(x.items_unqualified||0)}/${x.items_checked||0}</td></tr>`).join('')}</tbody></table></div>`}
function showInspForm(){showModal(`<h2>✅ 安全检查</h2><form onsubmit="submitInsp(event)"><label>日期*</label><input type="date" name="inspection_date" value="${new Date().toISOString().split('T')[0]}" required><label>类型*</label><select name="inspection_type" required><option>日常检查</option><option>专项检查</option><option>综合检查</option><option>季节性检查</option><option>节假日检查</option></select><label>区域*</label><input type="text" name="inspection_area" required><label>检查人*</label><input type="text" name="inspector" value="${CUSER?.name||''}" required><label>检查项</label><input type="number" name="items_checked" value="0"><label>不合格</label><input type="number" name="items_unchecked" value="0"><label>发现</label><textarea name="findings"></textarea><div class="ma"><button type="button" class="btn" onclick="closeModal()">取消</button><button type="submit" class="btn bp">提交</button></div></form>`)}
async function submitInsp(e){e.preventDefault();const d=Object.fromEntries(new FormData(e.target));d.items_checked=+d.items_checked;d.items_unchecked=+d.items_unchecked;addRow('inspections',d);closeModal();loadInsp()}

// ===== Accidents =====
async function loadAcc(){const a=db('accidents');$('mainContent').innerHTML=`<div class="tb"><button class="btn bd" onclick="showAccForm()">🚨 报告事故</button></div><div style="overflow-x:auto"><table><thead><tr><th>日期</th><th>类型</th><th>地点</th><th>严重</th><th>描述</th></tr></thead><tbody>${a.length?a.map(x=>`<tr><td>${x.accident_date}</td><td>${x.accident_type}</td><td>${x.accident_location}</td><td><span class="badge ${x.severity==='死亡'||x.severity==='重伤'?'br':'by'}">${x.severity}</span></td><td>${(x.accident_description||'').slice(0,25)}</td></tr>`).join(''):'<tr><td colspan="5" style="color:var(--green);text-align:center">✅ 无事故</td></tr>'}</tbody></table></div>`}
function showAccForm(){showModal(`<h2>🚨 事故报告</h2><form onsubmit="submitAcc(event)"><label>日期*</label><input type="date" name="accident_date" required><label>时间</label><input type="time" name="accident_time"><label>地点*</label><input type="text" name="accident_location" required><label>类型*</label><select name="accident_type" required><option>冒顶片帮</option><option>爆破事故</option><option>运输事故</option><option>触电</option><option>机械伤害</option><option>高处坠落</option><option>火灾</option><option>中毒窒息</option><option>其他</option></select><label>严重*</label><select name="severity" required><option>未遂事故</option><option>轻伤</option><option>重伤</option><option>死亡</option><option>财产损失</option></select><label>受伤</label><input type="number" name="injured_count" value="0"><label>死亡</label><input type="number" name="fatality_count" value="0"><label>描述*</label><textarea name="accident_description" required></textarea><label>直接原因</label><textarea name="direct_cause"></textarea><div class="ma"><button type="button" class="btn" onclick="closeModal()">取消</button><button type="submit" class="btn bd">提交</button></div></form>`)}
async function submitAcc(e){e.preventDefault();const d=Object.fromEntries(new FormData(e.target));d.injured_count=+d.injured_count;d.fatality_count=+d.fatality_count;addRow('accidents',d);closeModal();loadAcc()}

// ===== Entry/Exit =====
async function loadEntry(){const e=db('entry_exit');$('mainContent').innerHTML=`<div class="tb"><button class="btn bp" onclick="showEntryForm()">➕ 入井</button></div><div style="overflow-x:auto"><table><thead><tr><th>姓名</th><th>入井</th><th>出井</th><th>自救器</th><th>检测仪</th><th>矿灯</th><th>操作</th></tr></thead><tbody>${e.map(x=>`<tr><td>${x.person_name}</td><td>${(x.entry_time||'').slice(11,19)}</td><td>${x.exit_time?x.exit_time.slice(11,19):'<span class="badge by">井下</span>'}</td><td>${x.has_self_rescuer?'✅':'❌'}</td><td>${x.has_gas_detector?'✅':'❌'}</td><td>${x.has_cap_lamp?'✅':'❌'}</td><td>${x.exit_time?'-':`<button class="btn bxs bp" onclick="recExit(${x.id})">出井</button>`}</td></tr>`).join('')}</tbody></table></div>`}
function showEntryForm(){showModal(`<h2>🚪 入井登记</h2><form onsubmit="submitEntry(event)"><label>姓名*</label><input type="text" name="person_name" required><label>定位卡</label><input type="text" name="card_id"><label>自救器</label><select name="has_self_rescuer"><option value="1">携带</option><option value="0">未携带</option></select><label>检测仪</label><select name="has_gas_detector"><option value="1">携带</option><option value="0">未携带</option></select><label>矿灯</label><select name="has_cap_lamp"><option value="1">携带</option><option value="0">未携带</option></select><label>车辆</label><input type="text" name="vehicle_id"><div class="ma"><button type="button" class="btn" onclick="closeModal()">取消</button><button type="submit" class="btn bp">确认</button></div></form>`)}
async function submitEntry(e){e.preventDefault();const d=Object.fromEntries(new FormData(e.target));['has_self_rescuer','has_gas_detector','has_cap_lamp'].forEach(k=>d[k]=+d[k]);d.entry_time=new Date().toISOString();addRow('entry_exit',d);closeModal();loadEntry()}
async function recExit(id){updateRow('entry_exit',id,{exit_time:new Date().toISOString()});loadEntry()}

// ===== Regulations =====
async function loadRegs(){const r=db('regulations');const cats={};r.forEach(x=>{if(!cats[x.category])cats[x.category]=[];cats[x.category].push(x)});let h='';for(const[c,items]of Object.entries(cats)){h+=`<h4 style="color:var(--orange);margin:8px 0 4px">${c} (${items.length})</h4>`;items.forEach(i=>{h+=`<div style="background:var(--surface);border-radius:5px;padding:6px 9px;margin-bottom:2px;font-size:10px"><strong>${i.code}</strong> — ${i.name}</div>`})}$('mainContent').innerHTML=h}

// ===== Auto-login =====
const su=localStorage.getItem('_savedUser');if(su)$('loginUser').value=su;
</script>
</body>
</html>
