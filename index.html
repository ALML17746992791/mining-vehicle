<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0A1628;--header:#1A3A5C;--card:#14273E;--surface:#1C3552;--orange:#F5A623;--text:#F5F5F5;--sub:#B0BEC5;--hint:#78909C;--red:#E53935;--yellow:#FFC107;--green:#4CAF50}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}
.topbar{background:var(--header);padding:12px 16px;display:flex;align-items:center;position:sticky;top:0;z-index:200;box-shadow:0 2px 10px rgba(0,0,0,.3);gap:10px}
.topbar h1{font-size:16px;font-weight:600;flex:1;line-height:1.4;min-width:0}
.topbar .right{display:flex;align-items:center;gap:8px;font-size:13px;white-space:nowrap;flex-shrink:0}
.topbar .right button{background:rgba(255,255,255,.1);border:none;color:var(--text);padding:6px 10px;border-radius:6px;cursor:pointer;font-size:12px}
.topbar .right button:hover{background:rgba(255,255,255,.2)}
#syncStatus{font-size:14px;padding:3px 6px;border-radius:4px;margin-right:4px}
.sync-ok{color:#4CAF50}.sync-ing{color:#FFC107}.sync-err{color:#E53935}
.nav{background:var(--card);padding:6px 10px;display:flex;overflow-x:auto;gap:2px;position:sticky;top:52px;z-index:199;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav button{background:none;border:none;color:var(--sub);padding:8px 12px;border-radius:6px;font-size:13px;white-space:nowrap;cursor:pointer;transition:.2s}
.nav button.active{background:var(--orange);color:#000;font-weight:600}
.content{padding:14px;max-width:1200px;margin:0 auto}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:16px}
.stat{background:var(--card);border-radius:10px;padding:14px;border-left:4px solid var(--orange)}
.stat.red{border-color:var(--red)}.stat.yellow{border-color:var(--yellow)}.stat.green{border-color:var(--green)}
.stat .num{font-size:1.8em;font-weight:700}.stat .label{color:var(--hint);font-size:12px;margin-top:2px}
.g{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.card{background:var(--card);border-radius:10px;padding:14px;border:1px solid rgba(255,255,255,.06)}
.card.rb{border:2px solid var(--red)}.card.yb{border:2px solid var(--yellow)}
.card h4{color:var(--orange);margin-bottom:6px;font-size:15px}
.card .meta{font-size:13px;color:var(--sub);line-height:1.6}
.card .a{margin-top:8px;display:flex;gap:6px;flex-wrap:wrap}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.br{background:var(--red);color:#fff}.by{background:var(--yellow);color:#000}.bg{background:var(--green);color:#fff}.bb{background:#1976D2;color:#fff}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--surface);padding:8px 10px;text-align:left;font-weight:600;color:var(--orange);white-space:nowrap}
td{padding:7px 10px;border-bottom:1px solid rgba(255,255,255,.04)}tr:hover{background:rgba(255,255,255,.02)}
.tb{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.tb select,.tb input{background:var(--surface);border:1px solid rgba(255,255,255,.1);color:var(--text);padding:7px 10px;border-radius:6px;font-size:13px}
.btn{background:var(--surface);color:var(--text);border:1px solid rgba(255,255,255,.1);padding:7px 14px;border-radius:6px;cursor:pointer;font-size:13px;white-space:nowrap;transition:.2s}
.btn:hover{opacity:.85}.bp{background:var(--orange);color:#000;font-weight:600;border:none}.bd{background:var(--red);color:#fff;border:none}.bxs{padding:3px 8px;font-size:11px}
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;overflow-y:auto}
.modal-box{background:var(--card);border-radius:14px;padding:22px;width:100%;max-width:600px;max-height:85vh;overflow-y:auto}
.modal-box h2{color:var(--orange);margin-bottom:14px;font-size:17px}
.modal-box label{display:block;color:var(--sub);font-size:12px;margin-top:8px;margin-bottom:2px}
.modal-box input,.modal-box select,.modal-box textarea{width:100%;background:var(--surface);border:1px solid rgba(255,255,255,.1);color:var(--text);padding:9px 10px;border-radius:6px;font-size:14px;font-family:inherit}
.modal-box textarea{min-height:60px;resize:vertical}
.ma{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.lp{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.lc{background:var(--card);border-radius:16px;padding:32px 26px;width:100%;max-width:380px;text-align:center}
.lc h2{font-size:20px;margin-bottom:4px}.lc .sub{color:var(--hint);font-size:13px;margin-bottom:20px}
.lc input{width:100%;background:var(--surface);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:var(--text);font-size:16px;padding:12px;margin-bottom:10px}
.lc .lbtn{width:100%;background:var(--orange);color:#000;border:none;border-radius:10px;padding:12px;font-size:16px;font-weight:600;cursor:pointer}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--orange);color:#000;padding:10px 22px;border-radius:8px;z-index:3000;font-weight:600;display:none;font-size:14px}
.photo-preview{max-width:200px;max-height:150px;border-radius:6px;margin-top:4px}
.hidden{display:none!important}
@media(max-width:600px){.topbar h1{font-size:14px}.nav button{font-size:12px;padding:6px 9px}.stats{grid-template-columns:repeat(2,1fr)}.g{grid-template-columns:1fr}.modal-box{padding:14px}}
</style>

<script>
const $=s=>document.getElementById(s);
let CUSER=null,_curPage='dashboard';
let _idSeq={hazards:100,violations:200,equipment:300,vehicles:400,responsibilities:500,trainings:600,inspections:700,accidents:800,entry_exit:900,rectifications:1000,assessments:1100};

// ===== GitHub Sync =====
const GHAPI='https://api.github.com/repos/alml17746992791/mining-vehicle/contents/data/db.json';
const GH_H={Authorization:'token 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',Accept:'application/vnd.github.v3+json'};
let _sha=null;
function b64e(s){return btoa(unescape(encodeURIComponent(s)))}
function b64d(s){return decodeURIComponent(escape(atob(s)))}

async function ghPull(){try{const r=await fetch(GHAPI,{headers:GH_H});if(r.status===404)return _sha=null;if(!r.ok)throw new Error(r.status);const d=await r.json();_sha=d.sha;return JSON.parse(b64d(d.content))}catch(e){console.log('Pull err:',e);return null}}
async function ghPush(data){try{const body={message:'同步 '+new Date().toLocaleString('zh-CN').slice(0,16),content:b64e(JSON.stringify(data))};if(_sha)body.sha=_sha;const r=await fetch(GHAPI,{method:'PUT',headers:{...GH_H,'Content-Type':'application/json'},body:JSON.stringify(body)});if(!r.ok)throw new Error(r.status);_sha=(await r.json()).content.sha;return true}catch(e){console.log('Push err:',e);return false}}
function setSync(s){const e=$('syncStatus');e.className=s==='ok'?'sync-ok':s==='ing'?'sync-ing':'sync-err';e.textContent=s==='ok'?'☁️':s==='ing'?'🔄':'❌'}
async function pullAndMerge(){setSync('ing');const rd=await ghPull();if(rd){Object.keys(rd).forEach(k=>{if(k.startsWith('db_'))localStorage.setItem(k,JSON.stringify(rd[k]));if(k==='_idSeq')Object.assign(_idSeq,rd[k])});setSync('ok')}else{setSync('err');setTimeout(()=>setSync('ok'),3000)}}
let _pt=null;function schedulePush(){clearTimeout(_pt);_pt=setTimeout(async()=>{setSync('ing');const d={};['db_users','db_hazards','db_violations','db_equipment','db_vehicles','db_responsibilities','db_trainings','db_inspections','db_accidents','db_entry_exit','db_regulations','db_hazard_sources','db_rectifications','db_assessments'].forEach(k=>{d[k]=JSON.parse(localStorage.getItem(k)||'[]')});d._idSeq=_idSeq;(await ghPush(d))?setSync('ok'):setSync('err')},2000)}
async function manualSync(){setSync('ing');await pullAndMerge();setSync('ok');toast('同步完成');navTo(_curPage)}

// ===== Local DB =====
function db(tbl){return JSON.parse(localStorage.getItem('db_'+tbl)||'[]')}
function save(tbl,data){localStorage.setItem('db_'+tbl,JSON.stringify(data));schedulePush()}
function nid(tbl){return ++_idSeq[tbl]}
function addRow(tbl,row){row.id=nid(tbl);let d=db(tbl);d.push(row);save(tbl,d);return row}
function findRow(tbl,id){return db(tbl).find(x=>x.id===id)}
function updateRow(tbl,id,patch){let d=db(tbl),i=d.findIndex(x=>x.id===id);if(i>=0){Object.assign(d[i],patch);save(tbl,d)}}
function delRow(tbl,id){let d=db(tbl);d=d.filter(x=>x.id!==id);save(tbl,d)}

// ===== 法规关键词匹配（拍照自动引用） =====
const REG_KEYWORDS={
  'GB16423-2020':['顶板','浮石','支护','通风','风量','凿岩','爆破','运输','提升','电气'],
  'GB6722-2014':['爆破','炸药','雷管','盲炮','起爆','炮眼','装药','哑炮'],
  'GB/T11651-2008':['安全帽','劳保','防护','手套','口罩','防护服','安全带'],
  'GB50653-2011':['井巷','掘进','支护','锚杆','喷浆','混凝土','巷道'],
  'AQ2031-2011':['通风','风量','风质','风机','风筒','风门','局扇'],
  'AQ2061-2018':['水害','排水','防水','透水','涌水','水泵','水位'],
  '安监总局令75号':['重大隐患','重大危险源','判定','停产','停产整顿'],
  '安法2021':['安全生产','责任制','应急预案','事故','培训','投入'],
  '矿山法2009':['矿山安全','采矿','矿井','矿长','安全检查'],
  'AQ2026-2010':['提升','绞车','提升机','钢丝绳','罐笼','信号']
};
function matchRegs(desc,type){
  const matches=[],kw=(desc+' '+type).toLowerCase();
  Object.entries(REG_KEYWORDS).forEach(([code,kws])=>{
    let score=0;kws.forEach(w=>{if(kw.includes(w))score++});
    if(score>0)matches.push({code,score});
  });
  matches.sort((a,b)=>b.score-a.score);
  return matches.slice(0,5).map(m=>m.code);
}

// ===== Toast/Modal =====
function toast(m,t=2500){const e=$('toast');e.textContent=m;e.style.display='block';setTimeout(()=>e.style.display='none',t)}
function showModal(h){$('modalBox').innerHTML=h;$('modal').classList.remove('hidden')}
function closeModal(){$('modal').classList.add('hidden')}
$('modal').addEventListener('click',e=>{if(e.target===$('modal'))closeModal()});

// ===== Auth =====
async function doLogin(){
  const u=$('loginUser').value.trim(),p=$('loginPass').value.trim();
  if(!u||!p)return toast('请输入用户名和密码');
  initDB();
  const users=db('users'),user=users.find(x=>x.username===u);
  if(!user)return toast('用户不存在');
  if(user.status==='disabled')return toast('账号已禁用');
  if(user.password!==p)return toast('密码错误');
  CUSER=user;
  if($('rememberMe').checked)localStorage.setItem('_savedUser',u);
  $('loginPage').classList.add('hidden');$('appPage').classList.remove('hidden');
  $('userName').textContent='👤 '+user.name;
  $('adminBtn').classList.remove('hidden');
  initNav();
  setTimeout(()=>{try{pullAndMerge().then(()=>navTo('dashboard'))}catch(e){navTo('dashboard')}},300);
}
function doLogout(){CUSER=null;$('loginPage').classList.remove('hidden');$('appPage').classList.add('hidden')}
function showPwd(){showModal(`<h2>🔑 修改密码</h2><form onsubmit="submitPwd(event)"><label>原密码</label><input type="password" name="old" required><label>新密码</label><input type="password" name="new" required minlength="6"><label>确认</label><input type="password" name="confirm" required><div class="ma"><button type="button" class="btn" onclick="closeModal()">取消</button><button type="submit" class="btn bp">修改</button></div></form>`)}
async function submitPwd(e){e.preventDefault();const fd=new FormData(e.target);if(fd.get('old')!==CUSER.password)return toast('原密码错误');if(fd.get('new')!==fd.get('confirm'))return toast('两次不一致');updateRow('users',CUSER.id,{password:fd.get('new')});CUSER.password=fd.get('new');closeModal();toast('已修改')}

// ===== Admin（超级管理员：增删用户） =====
async function showAdmin(){
  if(!CUSER||CUSER.role!=='super_admin')return toast('仅超级管理员');
  const users=db('users');
  let r=users.map(u=>`<tr><td>${u.username}</td><td>${u.name}</td><td>${u.role}</td><td>${u.status}</td><td>${u.username!=='admin'?`<button class="btn bxs bd" onclick="delUser(${u.id})">🗑️</button><button class="btn bxs" onclick="toggleUser(${u.id})">${u.status==='active'?'禁用':'启用'}</button>`:'—'}</td></tr>`).join('');
  showModal(`<h2>👥 用户管理</h2><div style="overflow-x:auto"><table><thead><tr><th>用户名</th><th>姓名</th><th>角色</th><th>状态</th><th>操作</th></tr></thead><tbody>${r}</tbody></table></div><hr style="border-color:rgba(255,255,255,.1);margin:12px 0"><h3 style="color:var(--orange)">➕ 添加用户</h3><form onsubmit="addUser(event)"><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div><label>用户名*</label><input type="text" name="username" required></div><div><label>姓名*</label><input type="text" name="name" required></div><div><label>密码*</label><input type="password" name="password" required></div><div><label>角色</label><select name="role"><option value="user">普通用户</option><option value="admin">管理员</option><option value="super_admin">超级管理员</option></select></div></div><div class="ma"><button type="button" class="btn" onclick="closeModal()">关闭</button><button type="submit" class="btn bp">添加</button></div></form>`);
}
async function addUser(e){e.preventDefault();const d=Object.fromEntries(new FormData(e.target));const ex=db('users').find(x=>x.username===d.username);if(ex)return toast('用户名已存在');addRow('users',{...d,status:'active'});closeModal();toast('✅ 用户 '+d.username+' 已添加')}
async function delUser(id){if(!confirm('确定删除？'))return;delRow('users',id);closeModal();toast('已删除')}
async function toggleUser(id){const u=findRow('users',id);updateRow('users',id,{status:u.status==='active'?'disabled':'active'});closeModal();toast('状态已更新')}

// ===== Nav =====
function initNav(){
  document.querySelectorAll('#navBar button').forEach(b=>b.addEventListener('click',()=>{
    document.querySelectorAll('#navBar button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');_curPage=b.dataset.page;navTo(b.dataset.page);
  }));
}
async function navTo(p){_curPage=p;const c=$('mainContent');c.innerHTML='<div style="text-align:center;padding:50px;color:var(--hint)">⏳ 加载中...</div>';const fns={dashboard:loadDashboard,hazards:loadHazards,violations:loadViolations,equipment:loadEquip,vehicles:loadVehicles,responsibility:loadResp,training:loadTraining,inspections:loadInsp,accidents:loadAcc,entry:loadEntry,regulations:loadRegs};if(fns[p])await fns[p]()}

// ===== Dashboard =====
async function loadDashboard(){const h=db('hazards'),v=db('violations'),ve=db('vehicles');const total=h.length,pending=h.filter(x=>['待整改','整改中'].includes(x.status)).length,rectified=h.filter(x=>x.status==='已验收').length,major=h.filter(x=>['重大隐患','紧急隐患'].includes(x.hazard_level)&&['待整改','整改中'].includes(x.status)).length,redV=ve.filter(x=>x.alertLevel==='red').length;$('mainContent').innerHTML=`<div class="stats"><div class="stat"><div class="num">${total}</div><div class="label">累计隐患</div></div><div class="stat red"><div class="num">${major}</div><div class="label">重大/紧急未闭环</div></div><div class="stat yellow"><div class="num">${pending}</div><div class="label">待整改/整改中</div></div><div class="stat green"><div class="num">${rectified}</div><div class="label">已验收</div></div><div class="stat red"><div class="num">${v.length}</div><div class="label">三违记录</div></div><div class="stat red"><div class="num">${redV}</div><div class="label">🔴 超期车辆</div></div><div class="stat green"><div class="num">${total>0?Math.round(rectified/total*100):0}%</div><div class="label">整改率</div></div></div><h4 style="color:var(--orange);margin-bottom:8px">📋 最近隐患</h4><div style="overflow-x:auto"><table><thead><tr><th>ID</th><th>日期</th><th>位置</th><th>等级</th><th>描述</th><th>状态</th></tr></thead><tbody>${[...h].reverse().slice(0,8).map(x=>`<tr><td>${x.id}</td><td>${x.check_date||''}</td><td>${(x.check_location||'').slice(0,15)}</td><td><span class="badge ${x.hazard_level==='重大隐患'||x.hazard_level==='紧急隐患'?'br':'by'}">${x.hazard_level}</span></td><td>${(x.hazard_description||'').slice(0,35)}</td><td><span class="badge ${x.status==='已验收'?'bg':'bb'}">${x.status}</span></td></tr>`).join('')}</tbody></table></div>`}

// ===== 隐患排查（含拍照上传+自动引用法规） =====
async function loadHazards(){const h=db('hazards');$('mainContent').innerHTML=`<div class="tb"><button class="btn bp" onclick="showHazardForm()">📸 新增隐患</button></div><div style="overflow-x:auto"><table><thead><tr><th>ID</th><th>日期</th><th>位置</th><th>等级</th><th>描述</th><th>照片</th><th>法规</th><th>状态</th><th>操作</th></tr></thead><tbody>${h.map(x=>`<tr><td>${x.id}</td><td>${x.check_date}</td><td>${(x.check_location||'').slice(0,12)}</td><td><span class="badge ${x.hazard_level==='重大隐患'||x.hazard_level==='紧急隐患'?'br':'by'}">${x.hazard_level}</span></td><td>${(x.hazard_description||'').slice(0,30)}</td><td>${x.photo?'<img src="'+x.photo+'" style="width:40px;height:30px;border-radius:3px;cursor:pointer" onclick="showPhoto(`'+x.photo+'`)">':'—'}</td><td style="font-size:10px;color:var(--orange)">${(x.matched_regs||[]).join(', ')||'—'}</td><td><span class="badge ${x.status==='已验收'?'bg':'bb'}">${x.status}</span></td><td><button class="btn bxs" onclick="editHazard(${x.id},'${x.status}')">改</button><button class="btn bxs bp" onclick="viewRect(${x.id})">整改</button><button class="btn bxs bd" onclick="delHazard(${x.id})">删</button></td></tr>`).join('')}</tbody></table></div>`}
function showPhoto(url){showModal(`<div style="text-align:center"><img src="${url}" style="max-width:100%;max-height:70vh;border-radius:8px"></div><div class="ma"><button class="btn" onclick="closeModal()">关闭</button></div>`)}
function showHazardForm(){showModal(`<h2>📸 新增隐患排查（拍照自动引用法规）</h2><form onsubmit="submitHazard(event)"><label>检查日期*</label><input type="date" name="check_date" value="${new Date().toISOString().split('T')[0]}" required><label>检查位置*</label><input type="text" name="check_location" required placeholder="如：1250中段掘进面"><label>隐患类型*</label><select name="hazard_type" onchange="autoMatch()"><option>顶板管理</option><option>通风防尘</option><option>电气安全</option><option>爆破安全</option><option>机械设备</option><option>运输安全</option><option>火灾防治</option><option>水害防治</option><option>安全管理</option><option>其他</option></select><label>隐患等级*</label><select name="hazard_level" required><option>一般隐患</option><option>重大隐患</option><option>紧急隐患</option></select><label>隐患描述*</label><textarea name="hazard_description" required placeholder="请详细描述隐患情况，系统将自动匹配法规" oninput="autoMatch()"></textarea><label>📷 拍照/上传照片</label><input type="file" accept="image/*" onchange="previewPhoto(this)" style="padding:6px"><div id="photoPreview"></div><input type="hidden" name="photo" id="hiddenPhoto"><label>🔗 自动匹配法规</label><div id="regMatchResult" style="background:rgba(245,166,35,.1);border-radius:6px;padding:8px;font-size:12px;color:var(--orange);min-height:24px">输入描述后自动匹配...</div><label>检查人*</label><input type="text" name="checker" value="${CUSER?.name||''}" required><hr style="border-color:rgba(255,255,255,.1);margin:10px 0"><h4 style="color:var(--orange);margin-bottom:6px">🔧 整改措施</h4><label>整改措施</label><textarea name="rect_measure"></textarea><label>责任人</label><input type="text" name="responsible_person"><label>责任部门</label><input type="text" name="responsible_dept"><label>整改期限</label><input type="date" name="deadline"><div class="ma"><button type="button" class="btn" onclick="closeModal()">取消</button><button type="submit" class="btn bp">✅ 提交隐患</button></div></form>`)}
function autoMatch(){
  const desc=$('modalBox').querySelector('[name="hazard_description"]')?.value||'';
  const type=$('modalBox').querySelector('[name="hazard_type"]')?.value||'';
  const regs=matchRegs(desc,type);
  const d=$('regMatchResult');if(d)d.innerHTML=regs.length?regs.map(r=>`<span class="badge bg">${r}</span>`).join(' '):'未匹配到相关法规';
}
function previewPhoto(input){
  const f=input.files[0];if(!f)return;
  const r=new FileReader();r.onload=function(e){
    $('hiddenPhoto').value=e.target.result;
    $('photoPreview').innerHTML=`<img src="${e.target.result}" class="photo-preview" style="max-width:300px;max-height:200px"><div style="font-size:11px;color:var(--green);margin-top:2px">✅ 照片已就绪</div>`;
  };r.readAsDataURL(f);
}
async function submitHazard(e){e.preventDefault();const d=Object.fromEntries(new FormData(e.target));d.status='待整改';d.created_by=CUSER?.username;d.created_at=new Date().toISOString();d.photo=$('hiddenPhoto').value||'';d.matched_regs=matchRegs(d.hazard_description,d.hazard_type);const r=addRow('hazards',d);if(d.rect_measure)addRow('rectifications',{hazard_id:r.id,rect_measure:d.rect_measure,responsible_person:d.responsible_person||'',responsible_dept:d.responsible_dept||'',deadline:d.deadline||'',status:'未完成'});closeModal();loadHazards();toast('✅ 隐患已登记，自动引用法规: '+d.matched_regs.join(', '))}
async function editHazard(id,cur){const s=prompt('新状态: 待整改/整改中/已验收',cur);if(!s)return;updateRow('hazards',id,{status:s});loadHazards()}
async function delHazard(id){if(!confirm('确定删除?'))return;let rs=db('rectifications');rs=rs.filter(x=>x.hazard_id!==id);save('rectifications',rs);delRow('hazards',id);loadHazards()}
async function viewRect(hid){const rs=db('rectifications'),d=rs.find(r=>r.hazard_id===hid)||{};const bp=d.before_photo||'',ap=d.after_photo||'';showModal(`<h2>🔧 整改管理 #${hid}</h2><form onsubmit="submitRect(event,${hid})"><label>整改措施</label><textarea name="rect_measure">${d.rect_measure||''}</textarea><label>责任人</label><input type="text" name="responsible_person" value="${d.responsible_person||''}"><label>责任部门</label><input type="text" name="responsible_dept" value="${d.responsible_dept||''}"><label>期限</label><input type="date" name="deadline" value="${d.deadline||''}"><label>完成日期</label><input type="date" name="completed_date" value="${d.completed_date||''}"><label>费用(元)</label><input type="number" name="cost" value="${d.cost||0}"><hr style="border-color:rgba(255,255,255,.1);margin:10px 0"><h4 style="color:var(--orange)">📷 隐患闭环照片</h4><label>整改前照片</label>${bp?`<img src="${bp}" style="max-width:200px;max-height:150px;border-radius:6px;margin-bottom:4px"><br>`:''}<input type="file" accept="image/*" onchange="previewRectPhoto(this,'before')" style="padding:5px"><div id="beforePrev"></div><input type="hidden" name="before_photo" value="${bp}"><label>整改后照片</label>${ap?`<img src="${ap}" style="max-width:200px;max-height:150px;border-radius:6px;margin-bottom:4px"><br>`:''}<input type="file" accept="image/*" onchange="previewRectPhoto(this,'after')" style="padding:5px"><div id="afterPrev"></div><input type="hidden" name="after_photo" value="${ap}"><hr style="border-color:rgba(255,255,255,.1);margin:10px 0"><label>状态</label><select name="status"><option value="未完成" ${d.status==='未完成'?'selected':''}>未完成</option><option value="已完成" ${d.status==='已完成'?'selected':''}>已完成</option></select><label>验收人</label><input type="text" name="validator" value="${d.validator||CUSER?.name||''}"><div class="ma"><button type="button" class="btn" onclick="closeModal()">取消</button><button type="submit" class="btn bp">💾 保存</button></div></form>`);$('hiddenBeforePhoto').value=bp;$('hiddenAfterPhoto').value=ap}
function previewRectPhoto(input,type){
  const f=input.files[0];if(!f)return;
  const r=new FileReader();r.onload=function(e){
    $('modalBox').querySelector('[name="'+type+'_photo"]').value=e.target.result;
    document.getElementById(type+'Prev').innerHTML=`<img src="${e.target.result}" style="max-width:200px;max-height:150px;border-radius:6px;margin-top:2px"><div style="font-size:10px;color:var(--green)">✅ 照片已就绪</div>`;
  };r.readAsDataURL(f);
}

async function submitRect(e,hid){e.preventDefault();const d=Object.fromEntries(new FormData(e.target));d.cost=+d.cost;d.hazard_id=hid;d.before_photo=d.before_photo||'';d.after_photo=d.after_photo||'';const rs=db('rectifications');const i=rs.findIndex(r=>r.hazard_id===hid);if(i>=0){Object.assign(rs[i],d);save('rectifications',rs)}else addRow('rectifications',d);if(d.status==='已完成')updateRow('hazards',hid,{status:'已验收'});closeModal();loadHazards();toast('整改已保存')}

async function loadVehicles(){const v=db('vehicles');const red=v.filter(x=>x.alertLevel==='red').length,yellow=v.filter(x=>x.alertLevel==='yellow').length;$('mainContent').innerHTML=`<div class="stats"><div class="stat"><div class="num">${v.length}</div><div class="label">车辆总数</div></div><div class="stat red"><div class="num">${red}</div><div class="label">🔴 超期未保养</div></div><div class="stat yellow"><div class="num">${yellow}</div><div class="label">🟡 即将到期</div></div><div class="stat green"><div class="num">${v.length-red-yellow}</div><div class="label">🟢 正常</div></div></div><div class="g">${v.map(x=>`<div class="card ${x.alertLevel==='red'?'rb':x.alertLevel==='yellow'?'yb':''}"><h4>🚛 ${x.name} <span class="badge ${x.alertLevel==='red'?'br':x.alertLevel==='yellow'?'by':'bg'}">${x.alertLevel==='red'?'超期!':x.alertLevel==='yellow'?'将到期':'正常'}</span></h4><div class="meta"><span>类型: ${x.type} | 编号: ${x.number||'—'}</span><span style="color:${x.alertLevel==='red'?'var(--red)':'var(--sub)'}">上次保养: ${x.lastMaintenance||'无'} (${x.daysSince>0?x.daysSince+'天前':'今日'})</span><span>保养次数: ${Array.isArray(x.maintenanceRecords)?x.maintenanceRecords.length/2:0}次 | 状态: ${x.status||'在用'}</span></div><div class="a"><button class="btn bxs bp" onclick="showVRecords(${x.id})">📋 记录</button><button class="btn bxs" onclick="addVMaint(${x.id},'${x.name.split("'").join("\\'")}')">🔧 保养</button></div></div>`).join('')}</div>`}
async function showVRecords(vid){const v=findRow('vehicles',vid);if(!v)return;const recs=v.maintenanceRecords||[];let h='';recs.slice().reverse().forEach(r=>{const d=r.d||r.date,c=r.c||r.content,dr=r.r||r.driver,mats=(r.m||[]).map(function(m){return{mname:m.n||m.name,munit:m.u||m.unit,mqty:m.q||m.qty}});h+=`<div style="background:var(--surface);border-radius:8px;padding:10px;margin-bottom:8px"><strong>📅 ${d} — ${c}</strong><div style="font-size:11px;color:var(--hint);margin-top:2px">操作: ${dr||'—'}</div>${mats.length?`<div style="font-size:11px;color:var(--sub);margin-top:4px;padding:4px 6px;background:rgba(245,166,35,.1);border-radius:4px">🔩 配件: ${mats.map(function(m){return m.mname+' ×'+m.mqty+(m.munit||'')}).join(', ')}</div>`:''}</div>`})showModal(`<h2>🚛 ${v.name} 保养记录</h2>${h||'<p style="color:var(--hint);padding:20px">暂无保养记录</p>'}<div class="ma"><button class="btn bp" onclick="addVMaint(${vid},'${v.name.split("'").join("\\'")}')">🔧 添加保养</button><button class="btn" onclick="closeModal()">关闭</button></div>`)}
function addVMaint(vid,vname){showModal(`<h2>🔧 保养 — ${vname}</h2><form onsubmit="submitVMaint(event,${vid})"><label>日期*</label><input type="date" name="rd" value="${new Date().toISOString().split('T')[0]}" required><label>保养内容*</label><input type="text" name="rc" required placeholder="如：500小时保养"><label>操作人</label><input type="text" name="rdr"><label>工时/运行小时</label><input type="text" name="rh"><button type="button" class="btn bxs" style="margin-top:8px" onclick="addPRow()">➕ 添加配件</button><div id="prs"></div><div class="ma"><button type="button" class="btn" onclick="closeModal()">取消</button><button type="submit" class="btn bp">✅ 保存</button></div></form>`)}
function addPRow(){const i=$('prs').children.length;$('prs').innerHTML+=`<div style="display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:4px;margin-top:4px"><input type="text" name="pn_${i}" placeholder="配件名称"><input type="text" name="ps_${i}" placeholder="规格"><input type="text" name="pu_${i}" placeholder="单位"><input type="number" name="pq_${i}" placeholder="数量" value="1" step="0.1"></div>`}
async function submitVMaint(e,vid){e.preventDefault();const fd=new FormData(e.target);const v=findRow('vehicles',vid);if(!v)return;const recs=v.maintenanceRecords||[],parts=[];for(let i=0;;i++){const n=fd.get('pn_'+i);if(!n||!n.trim())break;parts.push({name:n.trim(),spec:fd.get('ps_'+i)||'',unit:fd.get('pu_'+i)||'',qty:+fd.get('pq_'+i)||1})}recs.push({d:fd.get('rd'),c:fd.get('rc'),r:fd.get('rdr'),m:parts});updateRow('vehicles',vid,{maintenance_records:recs,lastMaintenance:fd.get('rd'),daysSince:0,alertLevel:'green',status:'在用'});closeModal();loadVehicles();toast('✅ 保养已记录')}

async function submitTraining(e){e.preventDefault();const d=Object.fromEntries(new FormData(e.target));d.training_hours=+d.training_hours;d.attendees_count=+d.attendees_count;addRow('trainings',d);closeModal();loadTraining()}

// ===== 检查 =====
async function loadInsp(){const i=db('inspections');$('mainContent').innerHTML=`<div class="tb"><button class="btn bp" onclick="showInspForm()">➕ 新检查</button></div><div style="overflow-x:auto"><table><thead><tr><th>日期</th><th>类型</th><th>区域</th><th>检查人</th><th>合格/总数</th></tr></thead><tbody>${i.map(x=>`<tr><td>${x.inspection_date}</td><td>${x.inspection_type}</td><td>${x.inspection_area}</td><td>${x.inspector}</td><td>${(x.items_checked||0)-(x.items_unqualified||0)}/${x.items_checked||0}</td></tr>`).join('')}</tbody></table></div>`}
function showInspForm(){showModal(`<h2>✅ 安全检查</h2><form onsubmit="submitInsp(event)"><label>日期*</label><input type="date" name="inspection_date" value="${new Date().toISOString().split('T')[0]}" required><label>类型*</label><select name="inspection_type" required><option>日常检查</option><option>专项检查</option><option>综合检查</option><option>季节性检查</option><option>节假日检查</option></select><label>区域*</label><input type="text" name="inspection_area" required><label>检查人*</label><input type="text" name="inspector" value="${CUSER?.name||''}" required><label>检查项数</label><input type="number" name="items_checked" value="0"><label>不合格项</label><input type="number" name="items_unqualified" value="0"><label>发现问题</label><textarea name="findings"></textarea><div class="ma"><button type="button" class="btn" onclick="closeModal()">取消</button><button type="submit" class="btn bp">提交</button></div></form>`)}
async function submitInsp(e){e.preventDefault();const d=Object.fromEntries(new FormData(e.target));d.items_checked=+d.items_checked;d.items_unqualified=+d.items_unqualified;addRow('inspections',d);closeModal();loadInsp()}

// ===== 事故 =====
async function loadAcc(){const a=db('accidents');$('mainContent').innerHTML=`<div class="tb"><button class="btn bd" onclick="showAccForm()">🚨 报告事故</button></div><div style="overflow-x:auto"><table><thead><tr><th>日期</th><th>类型</th><th>地点</th><th>严重</th><th>描述</th></tr></thead><tbody>${a.length?a.map(x=>`<tr><td>${x.accident_date}</td><td>${x.accident_type}</td><td>${x.accident_location}</td><td><span class="badge ${x.severity==='死亡'||x.severity==='重伤'?'br':'by'}">${x.severity}</span></td><td>${(x.accident_description||'').slice(0,30)}</td></tr>`).join(''):'<tr><td colspan="5" style="color:var(--green);text-align:center;padding:20px">✅ 无事故记录</td></tr>'}</tbody></table></div>`}
function showAccForm(){showModal(`<h2>🚨 事故报告</h2><form onsubmit="submitAcc(event)"><label>日期*</label><input type="date" name="accident_date" required><label>时间</label><input type="time" name="accident_time"><label>地点*</label><input type="text" name="accident_location" required><label>类型*</label><select name="accident_type" required><option>冒顶片帮</option><option>爆破</option><option>运输</option><option>触电</option><option>机械伤害</option><option>高处坠落</option><option>火灾</option><option>中毒窒息</option><option>水害</option><option>其他</option></select><label>严重等级*</label><select name="severity" required><option>未遂事故</option><option>轻伤</option><option>重伤</option><option>死亡</option><option>财产损失</option></select><label>受伤人数</label><input type="number" name="injured_count" value="0"><label>死亡人数</label><input type="number" name="fatality_count" value="0"><label>描述*</label><textarea name="accident_description" required></textarea><label>直接原因</label><textarea name="direct_cause"></textarea><div class="ma"><button type="button" class="btn" onclick="closeModal()">取消</button><button type="submit" class="btn bd">🚨 提交事故报告</button></div></form>`)}
async function submitAcc(e){e.preventDefault();const d=Object.fromEntries(new FormData(e.target));d.injured_count=+d.injured_count;d.fatality_count=+d.fatality_count;addRow('accidents',d);closeModal();loadAcc()}

// ===== 出入井 =====
async function loadEntry(){const e=db('entry_exit');const underground=e.filter(x=>!x.exit_time);$('mainContent').innerHTML=`<div class="tb"><button class="btn bp" onclick="showEntryForm()">➕ 入井登记</button><span style="font-size:13px;color:var(--orange);margin-left:8px">目前井下: <strong>${underground.length}</strong> 人</span></div><div style="overflow-x:auto"><table><thead><tr><th>姓名</th><th>入井时间</th><th>出井时间</th><th>自救器</th><th>检测仪</th><th>矿灯</th><th>操作</th></tr></thead><tbody>${e.slice(-50).reverse().map(x=>`<tr><td>${x.person_name}</td><td>${(x.entry_time||'').slice(11,19)}</td><td>${x.exit_time?x.exit_time.slice(11,19):'<span class="badge by">● 井下</span>'}</td><td>${x.has_self_rescuer?'✅':'❌'}</td><td>${x.has_gas_detector?'✅':'❌'}</td><td>${x.has_cap_lamp?'✅':'❌'}</td><td>${x.exit_time?'—':`<button class="btn bxs bp" onclick="recExit(${x.id})">⬆️ 出井</button>`}</td></tr>`).join('')}</tbody></table></div>`}
function showEntryForm(){showModal(`<h2>🚪 入井登记</h2><form onsubmit="submitEntry(event)"><label>姓名*</label><input type="text" name="person_name" required><label>定位卡编号</label><input type="text" name="card_id"><label>自救器</label><select name="has_self_rescuer"><option value="1">✅ 携带</option><option value="0">❌ 未携带</option></select><label>气体检测仪</label><select name="has_gas_detector"><option value="1">✅ 携带</option><option value="0">❌ 未携带</option></select><label>矿灯</label><select name="has_cap_lamp"><option value="1">✅ 携带</option><option value="0">❌ 未携带</option></select><label>车辆编号</label><input type="text" name="vehicle_id" placeholder="如无可不填"><label>入井目的</label><input type="text" name="purpose"><div class="ma"><button type="button" class="btn" onclick="closeModal()">取消</button><button type="submit" class="btn bp">✅ 确认入井</button></div></form>`)}
async function submitEntry(e){e.preventDefault();const d=Object.fromEntries(new FormData(e.target));['has_self_rescuer','has_gas_detector','has_cap_lamp'].forEach(k=>d[k]=+d[k]);d.entry_time=new Date().toISOString();addRow('entry_exit',d);closeModal();loadEntry()}
async function recExit(id){updateRow('entry_exit',id,{exit_time:new Date().toISOString()});loadEntry();toast('已出井')}

// ===== 法规库（86部完整版） =====
async function loadRegs(){const r=db('regulations');const cats={};r.forEach(x=>{if(!cats[x.category])cats[x.category]=[];cats[x.category].push(x)});let h='<div class="stats"><div class="stat"><div class="num">'+r.length+'</div><div class="label">法规标准总数</div></div><div class="stat green"><div class="num">'+r.filter(x=>x.category.includes('法律')).length+'</div><div class="label">法律</div></div><div class="stat"><div class="num">'+r.filter(x=>x.category.includes('国家标准')).length+'</div><div class="label">国家标准</div></div><div class="stat"><div class="num">'+r.filter(x=>x.category.includes('行业标准')).length+'</div><div class="label">行业标准</div></div><div class="stat yellow"><div class="num">'+r.filter(x=>x.category.includes('部门规章')).length+'</div><div class="label">部门规章</div></div><div class="stat"><div class="num">'+r.filter(x=>x.category.includes('企业制度')).length+'</div><div class="label">企业制度</div></div></div>';for(const[c,items]of Object.entries(cats)){h+=`<h4 style="color:var(--orange);margin:12px 0 6px;font-size:14px">${c}（${items.length}部）</h4>`;items.forEach(i=>{h+=`<div style="background:var(--surface);border-radius:6px;padding:8px 12px;margin-bottom:3px;font-size:12px"><strong style="color:var(--orange)">${i.code}</strong> — ${i.name}</div>`})}$('mainContent').innerHTML=h}

const su=localStorage.getItem('_savedUser');if(su)$('loginUser').value=su;
</script>
